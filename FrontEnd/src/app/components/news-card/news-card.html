<a
  [href]="article.articleUrl"
  class="news-card"
  [attr.data-vibe]="article.vibe"
  target="_blank"
  dir="rtl"
>
  <div class="card-image">
    <img [src]="getThumbnail()" [alt]="article.headline" (error)="handleImageError($event)" />
  </div>

  <div class="card-content">
    <h2 class="headline">{{ article.headline }}</h2>
    <div *ngIf="article.credibilityLabel" class="flex items-center gap-2 mt-3">
  
  <span class="material-symbols-outlined text-sm" 
        [ngClass]="getCredibilityColor(article.credibilityScore)">
    verified_user
  </span>
  
  <span class="text-xs font-bold text-slate-500">
    مؤشر المصداقية: {{ article.credibilityLabel }}
  </span>
  
</div>
    <div class="meta-data">
      <span class="source">{{ article.source }}</span>

      <span class="date">{{
        article.publishedAt | date: 'EEEE-- dd / MMMM / yyyy' : '' : 'ar-SA' | arabicNumber
      }}</span>
    </div>
  </div>
</a>
