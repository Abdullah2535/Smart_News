<main class="feed-wrapper">
  <div class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 mb-6 shadow-sm flex items-center justify-between" dir="rtl">
  
  <button
    routerLink="/hub" 
    class="flex items-center gap-2 text-slate-500 hover:text-teal-600 font-bold transition-all bg-slate-50 hover:bg-teal-50 px-5 py-2.5 rounded-2xl active:scale-95"
  >
    <span class="material-symbols-outlined">home</span>
    <span>الرئيسية</span>
  </button>

  <div class="text-xl font-extrabold text-slate-800 flex items-center gap-2">
    <span class="material-symbols-outlined text-teal-600">newspaper</span>
    موجز الأخبار
  </div>
</div>

<div class="feed-container ...">
   </div>
  <div class="scroll-container">
    @for (item of newsList; track item.headline) {
      <app-news-card [article]="item"></app-news-card>
    } @empty {
      <p style="text-align: center; margin-top: 50px">جاري تحميل الأخبار...</p>
    }
  </div>
</main>

<footer class="bottom-bar">
  <a routerLink="/preferences" class="pref-btn" title="ضبط التفضيلات">
    <i class="fas fa-cog"></i>
  </a>
</footer>
